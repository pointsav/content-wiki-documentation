topic_id: PPN-01
title: PointSav Private Network (PPN) - Production Iteration 1
tier: Tier-4-OS
category: Infrastructure
tags: [mesh, psst, routing, relay, wireguard-substrate]
abstract: |
  A 3-node cryptographically fused mesh. The PPN utilizes a hub-and-spoke 
  topology where Node 2 (GCP) acts as the static discovery anchor for 
  Node 1 (Leased) and Node 3 (iMac).
details:
  routing_matrix:
    hub: Node 2 (GCP Relay). Static IP for global discovery.
    spoke_1: Node 1 (Leased). Dynamic IP behind NAT. Initiates outbound to Hub.
    spoke_2: Node 3 (iMac). Dynamic IP. Initiates outbound to Hub.
  security_protocol:
    tunnel: PointSav Secure Tunnel (PSST).
    encryption: ChaCha20-Poly1305 (WireGuard-based substrate).
    authorization: Machine-Based Authorization (MBA) keys physically pinned to silicon.
links: [OS-INFRA-01, SYS-SEC-02, route-network-admin]
